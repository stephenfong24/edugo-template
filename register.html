<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevate Academy | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body data-page="register">
    <div id="site-header"></div>
    <main class="auth-page register-auth-page">
      <section class="register-auth-section">
        <div class="container">
          <div class="auth-card register-auth-card">
            <div class="auth-form-wrap register-auth-form-wrap">
                  <h2 class="mb-4">Register</h2>
                  <form id="registerForm" novalidate>
                    <div class="row g-3">
                      <div class="col-md-6">
                        <div class="form-floating">
                          <input type="text" class="form-control" id="registerFirstName" name="registerFirstName" placeholder=" " required />
                          <label for="registerFirstName">First name</label>
                          <div class="invalid-feedback">Please enter your first name.</div>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-floating">
                          <input type="text" class="form-control" id="registerLastName" name="registerLastName" placeholder=" " required />
                          <label for="registerLastName">Last name</label>
                          <div class="invalid-feedback">Please enter your last name.</div>
                        </div>
                      </div>
                      <div class="col-12">
                        <div class="form-floating">
                          <input type="email" class="form-control" id="registerEmail" name="registerEmail" placeholder=" " required />
                          <label for="registerEmail">Email address</label>
                          <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-floating">
                          <input type="password" class="form-control" id="registerPassword" name="registerPassword" placeholder=" " minlength="8" required />
                          <label for="registerPassword">Password</label>
                          <div class="invalid-feedback">Password must be at least 8 characters.</div>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-floating">
                          <input type="password" class="form-control" id="registerConfirmPassword" name="registerConfirmPassword" placeholder=" " minlength="8" required />
                          <label for="registerConfirmPassword">Confirm password</label>
                          <div class="invalid-feedback">Please confirm your password.</div>
                        </div>
                      </div>
                    </div>
                    <div class="form-check mt-4">
                      <input class="form-check-input" type="checkbox" id="registerAgree" required />
                      <label class="form-check-label" for="registerAgree">I agree to the platform terms and understand this website is a demo experience.</label>
                      <div class="invalid-feedback">Please accept the terms to continue.</div>
                    </div>
                    <button type="submit" class="btn btn-brand btn-lg w-100 mt-4">Create Account</button>
                    <div class="auth-divider"><span>or continue with</span></div>
                    <div class="auth-social-grid">
                      <button type="button" class="btn auth-social-btn auth-social-google">
                        <span class="auth-social-icon" aria-hidden="true">
                          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                            <path fill="#EA4335" d="M12 10.2v3.95h5.61c-.24 1.49-1.8 4.36-5.61 4.36a6.02 6.02 0 1 1 0-12.04 5.46 5.46 0 0 1 3.85 1.5l2.62-2.53A9.02 9.02 0 1 0 12 21c5.17 0 8.59-3.63 8.59-8.75 0-.59-.07-1.04-.15-1.49H12Z"/>
                            <path fill="#4285F4" d="M21.26 12.24c0-.59-.06-1.04-.15-1.49H12v3.95h5.61a4.88 4.88 0 0 1-2.13 3.19v2.65h3.44c2.01-1.84 3.34-4.56 3.34-8.3Z"/>
                          </svg>
                        </span>
                        <span>Google</span>
                      </button>
                      <button type="button" class="btn auth-social-btn auth-social-linkedin">
                        <span class="auth-social-icon" aria-hidden="true">
                          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                            <path fill="#0A66C2" d="M20.45 20.45h-3.78v-5.57c0-1.33-.03-3.04-1.86-3.04-1.87 0-2.15 1.46-2.15 2.94v5.67H8.88V8.97h3.63v1.57h.05c.5-.95 1.72-1.94 3.54-1.94 3.79 0 4.49 2.49 4.49 5.73v6.12ZM5.11 7.39a2.19 2.19 0 1 1 0-4.38 2.19 2.19 0 0 1 0 4.38Zm-1.89 13.06h3.79V8.97H3.22v11.48Z"/>
                          </svg>
                        </span>
                        <span>LinkedIn</span>
                      </button>
                    </div>
                    <div id="registerFeedback" class="form-feedback mt-4"></div>
                    <p class="mt-4 mb-0 text-muted">Already registered? <a href="login.html">Sign in here</a>.</p>
                  </form>
                </div>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
  </body>
</html>
