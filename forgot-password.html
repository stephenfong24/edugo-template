<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduGo | Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body data-page="forgot-password">
    <div id="site-header"></div>
    <main class="auth-page forgot-auth-page">
      <section class="forgot-auth-section">
        <div class="container">
          <div class="auth-card single-column forgot-auth-card">
            <div class="auth-form-wrap forgot-auth-form-wrap">
              <span class="eyebrow text-brand">Account support</span>
              <h1 class="mb-3">Reset your password</h1>
              <p class="text-muted mb-4">Enter the email address associated with your account and we will send a temporary password to your registered email address.</p>
              <form id="forgotPasswordForm" novalidate>
                <div class="forgot-email-otp-row mb-3">
                  <div class="form-floating forgot-email-input-wrap">
                    <input type="email" class="form-control" id="forgotEmail" name="forgotEmail" placeholder=" " required />
                    <label for="forgotEmail">Email address</label>
                    <button type="button" class="forgot-otp-button" id="forgotRequestOtpButton">Request</button>
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                  </div>
                </div>
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" id="forgotOtp" name="forgotOtp" placeholder=" " inputmode="numeric" required />
                  <label for="forgotOtp">One Time Password (OTP)</label>
                  <div class="invalid-feedback">Please enter the OTP sent to your email.</div>
                </div>
                <button type="submit" class="btn btn-brand btn-lg w-100">Reset Password</button>
                <div id="forgotPasswordFeedback" class="form-feedback mt-4"></div>
                <p class="mt-4 mb-0 text-muted">Remembered your password? <a href="login.html">Back to sign in</a>.</p>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
