  <text x="82" y="318" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">Build practical</text>
  <text x="82" y="402" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF">digital skills</text>
  <text x="82" y="470" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600" fill="#D1FAE5">Guided mentorship, flexible study, and</text>
  <text x="82" y="514" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600" fill="#D1FAE5">portfolio-ready projects for busy learners.</text>
