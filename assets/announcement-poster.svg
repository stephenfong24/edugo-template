    <linearGradient id="posterBg" x1="0" y1="0" x2="960" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#064E3B"/>
      <stop offset="0.52" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#111827"/>
