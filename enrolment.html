<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduGo | Enrolment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="css/main.css?v=mobile-nav-slide-effect" />
  </head>
  <body data-page="my-learnings">
    <div id="site-header"></div>
    <main id="enrolmentPage" class="enrolment-page">
      <section class="enrolment-hero">
        <div class="container">
          <span class="eyebrow text-brand">Learning Studio</span>
          <h1 id="enrolmentCourseTitle">Course learning</h1>
          <p id="enrolmentCourseMeta">Loading course details...</p>
        </div>
      </section>

      <section class="section-space pt-0">
        <div class="container">
          <div id="enrolmentShell" class="enrolment-shell">
            <div class="enrolment-main-column">
              <section class="enrolment-video-card" aria-labelledby="enrolmentVideoTitle">
                <div class="enrolment-video-frame">
                  <div class="enrolment-video-topbar">
                    <span></span>
                    <span></span>
                    <span></span>
                  </div>
                  <button class="enrolment-play-button" type="button" aria-label="Play current lesson">
                    <i class="fa fa-play" aria-hidden="true"></i>
                  </button>
                  <div class="enrolment-video-gradient"></div>
                  <div class="enrolment-video-caption">
                    <span>Now playing</span>
                    <h2 id="enrolmentVideoTitle">Preparing lesson...</h2>
                    <p id="enrolmentVideoDuration">Loading lesson</p>
                  </div>
                </div>
                <div class="enrolment-video-actions">
                  <button id="expandLessonPanel" class="enrolment-panel-toggle" type="button" hidden>
                    <i class="fa fa-list-ul" aria-hidden="true"></i>
                    Show lessons
                  </button>
                  <button id="completeLessonButton" class="btn btn-brand" type="button">Mark lesson complete</button>
                </div>
              </section>

              <section class="course-detail-section course-overview-card">
                <div class="course-learn-wrapper">
                  <span class="eyebrow text-brand">Course Overview</span>
                  <h3>What you will learn</h3>
                  <div id="enrolmentCourseOverview"></div>
                </div>
              </section>

              <section class="course-detail-section card-surface">
                <div class="course-section-heading">
                  <span class="eyebrow text-brand">About This Course</span>
                  <h2>About the course</h2>
                </div>
                <div id="enrolmentCourseDescription"></div>
              </section>

              <section class="course-detail-section course-audience-card">
                <div class="course-audience-wrapper">
                  <span class="eyebrow text-brand">Learners</span>
                  <h3>Who this course is for</h3>
                  <ul id="enrolmentTargetLearners"></ul>
                </div>
              </section>
            </div>

            <aside class="enrolment-lesson-panel" aria-label="Course lessons">
              <div class="enrolment-lesson-card">
                <div class="enrolment-lesson-header">
                  <div>
                    <span class="eyebrow text-brand">Course Lessons</span>
                    <h2>Lessons</h2>
                  </div>
                  <button id="collapseLessonPanel" class="enrolment-icon-button" type="button" aria-label="Collapse lesson panel" aria-expanded="true">
                    <i class="fa fa-angle-right" aria-hidden="true"></i>
                  </button>
                </div>
                <ol id="enrolmentLessonList" class="enrolment-lesson-list"></ol>
              </div>
            </aside>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="js/app.js?v=mobile-nav-slide-effect"></script>
  </body>
</html>
