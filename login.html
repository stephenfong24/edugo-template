<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduGo | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <link rel="stylesheet" href="css/main.css?v=social-login-flow" />
  </head>
  <body data-page="login">
    <div id="site-header"></div>
    <main class="auth-page login-auth-page">
      <section class="login-auth-section">
        <div class="container">
          <div class="auth-card login-auth-card">
            <div class="auth-form-wrap login-auth-form-wrap">
                  <div class="login-success-mark" aria-hidden="true">
                    <span></span>
                  </div>
                  <p class="auth-kicker">Demo access</p>
                  <h2 class="mb-2">Welcome back</h2>
                  <p class="login-demo-note">Use <strong>guest</strong> for username and <strong>guest</strong> for password.</p>
                  <form id="loginForm" novalidate>
                    <div class="form-floating mb-3">
                      <input type="text" class="form-control" id="loginUsername" name="loginUsername" placeholder=" " autocomplete="username" required />
                      <label for="loginUsername">Username</label>
                      <div class="invalid-feedback">Please enter your username.</div>
                    </div>
                    <div class="form-floating mb-3">
                      <input type="password" class="form-control" id="loginPassword" name="loginPassword" placeholder=" " autocomplete="current-password" required />
                      <label for="loginPassword">Password</label>
                      <div class="invalid-feedback">Please enter your password.</div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                      <div class="form-check"><input class="form-check-input" type="checkbox" id="rememberMe" /><label class="form-check-label" for="rememberMe">Remember me</label></div>
                      <a href="forgot-password.html">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-brand btn-lg w-100 login-submit-button">
                      <span class="login-button-idle">Sign In</span>
                      <span class="login-button-loading"><span class="login-spinner" aria-hidden="true"></span>Verifying</span>
                      <span class="login-button-success">Success</span>
                    </button>
                    <div class="auth-divider"><span>or continue with</span></div>
                    <div class="auth-social-grid">
                      <button type="button" class="btn auth-social-btn auth-social-google" data-social-login="google">
                        <span class="auth-social-icon" aria-hidden="true">
                          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                            <path fill="#EA4335" d="M12 10.2v3.95h5.61c-.24 1.49-1.8 4.36-5.61 4.36a6.02 6.02 0 1 1 0-12.04 5.46 5.46 0 0 1 3.85 1.5l2.62-2.53A9.02 9.02 0 1 0 12 21c5.17 0 8.59-3.63 8.59-8.75 0-.59-.07-1.04-.15-1.49H12Z"/>
                            <path fill="#4285F4" d="M21.26 12.24c0-.59-.06-1.04-.15-1.49H12v3.95h5.61a4.88 4.88 0 0 1-2.13 3.19v2.65h3.44c2.01-1.84 3.34-4.56 3.34-8.3Z"/>
                          </svg>
                        </span>
                        <span>Google</span>
                      </button>
                      <button type="button" class="btn auth-social-btn auth-social-linkedin" data-social-login="linkedin">
                        <span class="auth-social-icon" aria-hidden="true">
                          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                            <path fill="#0A66C2" d="M20.45 20.45h-3.78v-5.57c0-1.33-.03-3.04-1.86-3.04-1.87 0-2.15 1.46-2.15 2.94v5.67H8.88V8.97h3.63v1.57h.05c.5-.95 1.72-1.94 3.54-1.94 3.79 0 4.49 2.49 4.49 5.73v6.12ZM5.11 7.39a2.19 2.19 0 1 1 0-4.38 2.19 2.19 0 0 1 0 4.38Zm-1.89 13.06h3.79V8.97H3.22v11.48Z"/>
                          </svg>
                        </span>
                        <span>LinkedIn</span>
                      </button>
                    </div>
                    <div id="loginFeedback" class="form-feedback mt-4"></div>
                    <p class="mt-4 mb-0 text-muted">New here? <a href="register.html">Create an account</a>.</p>
                  </form>
                </div>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="js/app.js?v=social-login-flow"></script>
  </body>
</html>
